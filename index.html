<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheely</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1B2A4A; --surface: rgba(255,255,255,0.06); --line: rgba(255,255,255,0.12);
      --gold: #C8973A; --gold-light: #E8B96A; --gold-pale: rgba(200,151,58,0.15);
      --white: #FFFFFF; --muted: rgba(255,255,255,0.42); --future-dot: #3A5080;
    }
    body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--white); min-height: 100vh; padding-bottom: 80px; }
    header { padding: 0 0 40px; max-width: 480px; margin: 0 auto; }
    .hero-img { width: 100%; max-height: 340px; object-fit: cover; object-position: center top; display: block; margin-bottom: 28px; }
    .header-text { padding: 0 28px; }
    h1 { font-family: 'DM Serif Display', serif; font-size: 3.6rem; font-weight: 400; line-height: 0.95; color: var(--gold-light); letter-spacing: -1px; margin-bottom: 14px; cursor: default; }
    .sub { font-size: 0.85rem; color: var(--muted); font-weight: 300; letter-spacing: 0.06em; display: flex; align-items: center; gap: 8px; }
    .paw { opacity: 0.7; }
    .road-divider { max-width: 480px; margin: 0 auto 36px; padding: 0 28px; }
    .road-divider-line { height: 1px; background: linear-gradient(to left, transparent, rgba(200,151,58,0.18), transparent); }
    .road-wrap { max-width: 480px; margin: 0 auto; padding: 0 28px; }
    .road { position: relative; padding-right: 40px; }
    .road::before { content: ''; position: absolute; right: 13px; top: 12px; bottom: 12px; width: 2px; background: rgba(255,255,255,0.1); }
    .road-progress-line { position: absolute; right: 13px; top: 12px; width: 2px; background: linear-gradient(to bottom, var(--gold), var(--gold-light)); z-index: 1; transition: height 0.8s ease; }
    .stop { position: relative; padding-bottom: 10px; margin-bottom: 22px; }
    .stop-dot { position: absolute; right: -40px; top: 10px; width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--future-dot); background: var(--bg); z-index: 2; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; overflow: hidden; }
    .stop.done .stop-dot { border-color: var(--gold); background: var(--gold); }
    .stop.current .stop-dot { border-color: var(--gold-light); background: var(--gold); box-shadow: 0 0 0 5px var(--gold-pale); animation: pulse 2.4s ease-in-out infinite; }
    .stop.goal .stop-dot { border-color: var(--gold); background: var(--bg); }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 4px var(--gold-pale)}50%{box-shadow:0 0 0 8px rgba(200,151,58,0.08)}}
    .dot-inner { width: 7px; height: 7px; border-radius: 50%; background: white; opacity: 0; }
    .stop.done .dot-inner, .stop.current .dot-inner { opacity: 1; }
    .stop-dot.has-photo { background-size: cover; background-position: center; border-color: var(--gold) !important; box-shadow: 0 0 0 2px var(--gold-pale); }
    .stop-dot.has-photo .dot-inner { display: none; }
    .stop-inline { display: flex; align-items: baseline; gap: 10px; padding: 10px 0 0; cursor: pointer; user-select: none; }
    .stop-inline-name { font-size: 0.88rem; font-weight: 500; color: var(--white); flex: 1; }
    .stop.future .stop-inline-name, .stop.goal .stop-inline-name { color: var(--muted); font-weight: 400; }
    .stop.goal .stop-inline-name { color: var(--gold-light); }
    .stop-inline-meta { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
    .stop-detail { overflow: hidden; max-height: 0; transition: max-height 0.35s ease, opacity 0.3s ease; opacity: 0; }
    .stop-detail.open { max-height: 500px; opacity: 1; }
    .stop-detail-inner { padding: 12px 0 14px; border-top: 1px solid var(--line); margin-top: 8px; }
    .detail-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .detail-chip { font-size: 0.74rem; color: var(--gold-light); background: var(--gold-pale); border-radius: 6px; padding: 3px 10px; }
    .detail-note { font-size: 0.8rem; color: var(--muted); font-style: italic; margin-bottom: 12px; }
    .photo-zone { border: 1px dashed rgba(200,151,58,0.3); border-radius: 10px; overflow: hidden; position: relative; margin-bottom: 10px; cursor: pointer; }
    .photo-zone img { width: 100%; display: block; border-radius: 9px; }
    .photo-placeholder { padding: 14px; text-align: center; font-size: 0.78rem; color: var(--muted); }
    .photo-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .waze-btn { display: flex; align-items: center; justify-content: center; gap: 6px; border: 1px solid rgba(200,151,58,0.35); border-radius: 8px; padding: 9px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500; color: var(--gold-light); background: transparent; cursor: pointer; width: 100%; transition: background 0.15s; margin-bottom: 6px; }
    .waze-btn:active { background: var(--gold-pale); }
    .del-btn { background: none; border: none; cursor: pointer; font-size: 0.8rem; opacity: 0.35; display: block; padding: 2px; transition: opacity 0.2s; }
    .del-btn:active { opacity: 0.9; }
    .add-section { max-width: 480px; margin: 40px auto 0; padding: 0 28px; }
    .add-label { font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
    .add-card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 20px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 0.72rem; color: var(--muted); margin-bottom: 5px; }
    .field input { width: 100%; border: 1px solid rgba(255,255,255,0.12); border-radius: 9px; padding: 10px 13px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--white); background: rgba(255,255,255,0.05); outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: var(--gold); }
    .field input::placeholder { color: rgba(255,255,255,0.25); }
    .row2 { display: flex; gap: 10px; }
    .row2 .field { flex: 1; }
    .add-btn { width: 100%; background: var(--gold); color: var(--bg); border: none; border-radius: 9px; padding: 12px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .sync-status { text-align: center; font-size: 0.72rem; color: var(--muted); margin-top: 10px; min-height: 18px; }
    .sync-status.ok { color: rgba(100,200,100,0.7); }
    .sync-status.err { color: rgba(200,100,100,0.7); }
    .admin-hint { max-width: 480px; margin: 0 auto; padding: 8px 28px 0; text-align: left; }
    .admin-hint button { background: none; border: none; color: rgba(255,255,255,0.08); font-size: 0.7rem; cursor: pointer; }
    .nt-tab { background: rgba(255,255,255,0.05); border: 1px solid var(--line); border-radius: 8px; padding: 6px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; color: var(--muted); cursor: pointer; transition: all 0.2s; }
    .nt-tab.active { background: var(--gold-pale); border-color: var(--gold); color: var(--gold-light); }
    .dest-card { background: rgba(255,255,255,0.04); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
    .dest-emoji { font-size: 1.6rem; min-width: 36px; text-align: center; }
    .dest-info { flex: 1; }
    .dest-name { font-size: 0.92rem; font-weight: 500; color: var(--white); margin-bottom: 3px; }
    .dest-sub { font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; }
    .dest-badge { font-size: 0.7rem; background: var(--gold-pale); color: var(--gold-light); border-radius: 6px; padding: 2px 8px; white-space: nowrap; display: inline-block; margin-bottom: 6px; }
    .dest-badge.ready { background: rgba(76,175,80,0.15); color: #81C784; }
    .dest-waze { background: rgba(46,204,250,0.12); border: 1px solid rgba(46,204,250,0.25); border-radius: 8px; padding: 7px 12px; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; color: #2ECCFA; cursor: pointer; white-space: nowrap; }
  </style>
</head>
<body>

<div class="add-section" id="pendingSection" style="display:none;margin-top:28px;">

<!-- NEXT TRIP PLANNER -->
<div class="add-section" id="nextTripSection" style="display:none">
  <div class="add-label">הנסיעה הבאה 🐾</div>
  <div class="add-card">
    <div class="field">
      <label>שם / יעד</label>
      <input type="text" id="ntName" placeholder="יעלי ברמת השרון, פארק כלבים..." />
    </div>
    <div class="field">
      <label>כתובת</label>
      <input type="text" id="ntAddr" placeholder="כתובת מלאה" />
    </div>

      <button class="add-btn" style="flex:1;margin:0" onclick="openWazeForDistance()">פתח Waze למרחק</button>
    </div>
    <div class="field">
      <label>כמה ק"מ הציג Waze?</label>
      <input type="number" id="ntKm" placeholder="למשל: 12" min="1" step="0.5" />
    </div>
    <button class="add-btn" onclick="calcAndInvite()" style="background:rgba(37,211,102,0.8);">
      📲 חשב ושלח הזמנה בוואטסאפ
    </button>
    <div id="ntResult" style="margin-top:12px;font-size:0.82rem;color:var(--gold-light);text-align:center;line-height:1.6;"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBoZM1dcSqTPjwK0oF4BHwhXAUCd8ryJIw",
  authDomain: "wheely-7b0b8.firebaseapp.com",
  projectId: "wheely-7b0b8",
  storageBucket: "wheely-7b0b8.firebasestorage.app",
  messagingSenderId: "405903225497",
  appId: "1:405903225497:web:8066c2813a9627bf00fe08"
});
const db = getFirestore(app);

let allStops = [];
let isAdmin = false;
let tapCount = 0;

window.handleTitleTap = function() {
  tapCount++;
  setTimeout(() => tapCount = 0, 2000);
  if (tapCount >= 5) {
    tapCount = 0;
    if (isAdmin) {
      isAdmin = false;
      document.getElementById('adminSection').style.display = 'none';
      document.getElementById('nextTripSection').style.display = 'none';
      document.getElementById('pendingSection').style.display = 'none';
      document.getElementById('adminIndicator').style.display = 'none';
      render();
    } else {
      const pw = prompt('סיסמה:');
      if (pw === '1974') {
        isAdmin = true;
        document.getElementById('adminSection').style.display = 'block';
        document.getElementById('nextTripSection').style.display = 'block';
        document.getElementById('pendingSection').style.display = 'block';
        document.getElementById('adminIndicator').style.display = 'block';
        document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
        render();
        loadPending();
      } else if (pw !== null) alert('סיסמה שגויה');
    }
  }
}

function metaStr(s) {
  const parts = [];
  if (s.date) parts.push(s.date);
  if (s.minutes && (s.type==='done'||s.type==='current')) parts.push(`${s.minutes} דק׳`);
  if (s.km) parts.push(`${s.km} ק״מ`);
  return parts.join(' · ');
}

function render() {
  const road = document.getElementById('road');
  road.querySelectorAll('.stop').forEach(el => el.remove());
  const typeOrder = { done: 0, current: 0, future: 1, goal: 2 };
  const sorted = [...allStops].sort((a,b) => {
    if (typeOrder[a.type] !== typeOrder[b.type]) return typeOrder[a.type] - typeOrder[b.type];
    return (a.order||0) - (b.order||0);
  });
  sorted.forEach(s => {
    const el = document.createElement('div');
    el.className = `stop ${s.type}`;
    const meta = metaStr(s);
    const canEdit = s.type === 'done' || s.type === 'current';
    el.innerHTML = `
      <div class="stop-dot ${s.photo ? 'has-photo' : ''}" onclick="toggleStop('${s.fbId}')"
        ${s.photo ? `style="background-image:url('${s.photo}')"` : ''}>
        <div class="dot-inner"></div>
      </div>
      <div class="stop-inline" onclick="toggleStop('${s.fbId}')">
        <span class="stop-inline-name">${s.name}</span>
        ${meta ? `<span class="stop-inline-meta">${meta}</span>` : ''}
      </div>
      <div class="stop-detail" id="detail-${s.fbId}">
        <div class="stop-detail-inner">
          ${s.note ? `<div class="detail-note">${s.note}</div>` : ''}
          ${meta ? `<div class="detail-row"><span class="detail-chip">${meta}</span></div>` : ''}
          ${canEdit ? `
            <div class="photo-zone" id="pz-${s.fbId}">
              ${s.photo ? `<img src="${s.photo}" alt="תמונה" />`
                : isAdmin ? `<div class="photo-placeholder">📷 הוסף תמונה</div>
                   <input type="file" accept="image/*" onchange="addPhoto('${s.fbId}',this)" />`
                : ''}
            </div>
            <button class="waze-btn" onclick="waze('${encodeURIComponent(s.name)}')">נווט ב-Waze ↗</button>
            ${isAdmin ? `<button class="del-btn" onclick="deleteTrip('${s.fbId}')">🗑 מחק</button>` : ''}
          ` : ''}
        </div>
      </div>
    `;
    road.appendChild(el);
  });
  updateProgressLine();
}

window.toggleStop = function(id) {
  const d = document.getElementById('detail-' + id);
  if (d) d.classList.toggle('open');
  setTimeout(updateProgressLine, 360);
}

function updateProgressLine() {
  const stops = document.querySelectorAll('.stop.done, .stop.current');
  if (!stops.length) return;
  const last = stops[stops.length-1];
  const roadEl = document.getElementById('road');
  const dotEl = last.querySelector('.stop-dot');
  const h = (dotEl.getBoundingClientRect().top + 10) - roadEl.getBoundingClientRect().top;
  document.getElementById('progressLine').style.height = Math.max(0,h) + 'px';
}

// Listen to stops collection
onSnapshot(query(collection(db,'stops'), orderBy('createdAt','asc')), snap => {
  allStops = snap.docs.map(d => ({ fbId: d.id, ...d.data() }));
  render();
  renderDests();
}, err => {
  console.error('Firebase error:', err);
});

window.addTrip = async function() {

window.addPhoto = function(fbId, input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = async () => {
      const canvas = document.createElement('canvas');
      const MAX = 500;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = Math.round(h*MAX/w); w=MAX; } }
      else { if (h > MAX) { w = Math.round(w*MAX/h); h=MAX; } }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const base64 = canvas.toDataURL('image/jpeg',0.6);
      const pz = document.getElementById('pz-'+fbId);
      if (pz) pz.innerHTML = `<img src="${base64}" alt="תמונה" />`;
      try { await updateDoc(doc(db,'stops',fbId), {photo:base64}); }
      catch(err) { alert('שגיאה: '+err.message); }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── GEOCODING + INVITE ───────────────────────────────────────────────────────
const MY_PHONE = '972522339090';
let currentInviteMsg = '';

const TLV = { lat: 32.0853, lng: 34.7818 };

function distanceKm(lat, lng) {
  const R = 6371;
  const dLat = (lat - TLV.lat) * Math.PI / 180;
  const dLng = (lng - TLV.lng) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(TLV.lat*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

window.requestVisit = async function() {
  const name = document.getElementById('invName').value.trim();
  const addr = document.getElementById('invAddr').value.trim();
  if (!name || !addr) { alert('נא למלא שם וכתובת 🐾'); return; }

  const result = document.getElementById('invResult');
  result.textContent = '🔍 מחפש כתובת...';
  result.style.display = 'block';

  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr+', ישראל')}&format=json&limit=1`);
    const data = await res.json();
    if (!data.length) { result.textContent = '❌ לא מצאנו את הכתובת, נסי להיות יותר מדויקת'; return; }

    const km = distanceKm(parseFloat(data[0].lat), parseFloat(data[0].lon));
    const maxKm = Math.max(...allStops.filter(s=>s.type==='done'||s.type==='current').map(s=>s.km||0), 1);
    const remaining = Math.max(0, km - maxKm);
    const weeksLeft = Math.ceil(remaining / 2);

    let dateText, cardDateText;
    if (weeksLeft <= 0) {
      dateText = '✅ ווילי מוכן לבוא עכשיו!';
      cardDateText = 'מוכן לבוא עכשיו! 🎉';
    } else {
      const date = new Date();
      date.setDate(date.getDate() + weeksLeft * 7);
      const d = date.toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'});
      dateText = `🐾 ווילי יוכל להגיע אליך\nבסביבות ${d}`;
      cardDateText = `בסביבות ${d}\n${km} ק"מ מת"א · עוד ~${weeksLeft} שבועות`;
    }

    currentInviteMsg = `היי! 🐾🚗\n${name} כאן!\nרוצה שווילי יבוא לבקר אותי ב${addr}\n\n${dateText.replace('🐾 ','')}`;

    result.textContent = dateText;

    // Save to Firebase as pending invitation (not shown in road)
    try {
      await addDoc(collection(db,'invitations'), {
        name, addr, km, weeksLeft,
        cardDate: cardDateText,
        createdAt: Date.now(),
        approved: false
      });
    } catch(e) { console.error('invite save error', e); }

    // Show invitation card
    document.getElementById('cardName').textContent = name + ' 🐾';
    document.getElementById('cardDate').textContent = cardDateText;
    document.getElementById('invCard').style.display = 'block';
    document.getElementById('invCard').scrollIntoView({behavior:'smooth'});

  } catch(e) {
    result.textContent = '❌ שגיאה בחיפוש הכתובת';
  }
}

function renderDests() {
  const willyMinutes = Math.max(...allStops.filter(s=>s.type==='done'||s.type==='current').map(s=>s.minutes||0), 1);
  const list = document.getElementById('destList');

  const filtered = currentFilter === 0 ? DESTS : DESTS.filter(d => d.minutes <= currentFilter);

  list.innerHTML = filtered.map(d => {
    const canGo = d.minutes <= willyMinutes;
    return `

      note: cardDate,
      type: 'future',

  } catch(e) { alert('שגיאה: '+e.message); }
}
